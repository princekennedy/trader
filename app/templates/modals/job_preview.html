<div x-show="showPreview" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
  <div class="fixed inset-0 bg-black/60" @click="showPreview=false"></div>
  <div class="relative bg-white rounded-xl shadow-2xl max-w-5xl w-full max-h-[90vh] flex flex-col">
    <div class="flex items-center justify-between p-4 border-b border-gray-100 flex-shrink-0">
      <h3 class="text-sm font-semibold text-gray-900">
        <i class="fa-solid fa-file-chart-column mr-1.5 text-primary-500"></i>
        <span x-text="jobName || 'Preview'"></span>
      </h3>
      <button @click="showPreview=false" class="text-gray-400 hover:text-gray-600 transition-colors">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
    </div>
    {% include "_chart_tabs.html" %}
  </div>
</div>
