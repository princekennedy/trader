{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block heading %}Settings{% endblock %}
{% block subtitle %}Configure your trading platform{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <div class="bg-white rounded-xl border border-gray-200 p-5 mb-6">
    <h3 class="text-base font-semibold text-gray-900 mb-4">General Settings</h3>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Default Symbol</label>
        <input type="text" value="BTCUSDT" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Default Timeframe</label>
        <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none bg-white">
          <option>1h</option>
          <option>4h</option>
          <option>1d</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Upload Directory</label>
        <input type="text" value="uploads/" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none bg-gray-50 text-gray-500" readonly>
      </div>
    </div>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 p-5 mb-6">
    <h3 class="text-base font-semibold text-gray-900 mb-4">Extraction Settings</h3>
    <div class="space-y-4">
      <label class="flex items-center gap-3">
        <input type="checkbox" checked class="w-4 h-4 rounded border-gray-300 text-primary-600 focus:ring-primary-500">
        <span class="text-sm text-gray-700">Auto-detect symbol from image</span>
      </label>
      <label class="flex items-center gap-3">
        <input type="checkbox" checked class="w-4 h-4 rounded border-gray-300 text-primary-600 focus:ring-primary-500">
        <span class="text-sm text-gray-700">Auto-detect timeframe</span>
      </label>
      <label class="flex items-center gap-3">
        <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-primary-600 focus:ring-primary-500">
        <span class="text-sm text-gray-700">Extract volume data</span>
      </label>
    </div>
  </div>

  <button class="px-6 py-2.5 bg-primary-600 text-white text-sm font-medium rounded-lg hover:bg-primary-700 transition-colors">
    <i class="fa-solid fa-floppy-disk mr-1.5"></i> Save Settings
  </button>
</div>
{% endblock %}
