{% extends "base.html" %}
{% block title %}Edit Organization{% endblock %}
{% block heading %}Edit Organization{% endblock %}
{% block subtitle %}{{ org.name }}{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <form method="POST" class="bg-white rounded-xl border border-gray-200 p-5 mb-6">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
        <input type="text" name="name" value="{{ org.name }}" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea name="description" rows="3"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none"
                  placeholder="Optional description">{{ org.description }}</textarea>
      </div>
    </div>
    <div class="flex items-center gap-3 mt-6">
      <button type="submit" class="px-4 py-2 bg-primary-600 text-white text-sm font-medium rounded-lg hover:bg-primary-700 transition-colors">
        Save Changes
      </button>
      <a href="{{ url_for('org.settings', org_id=org.id) }}" class="px-4 py-2 border border-gray-300 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50 transition-colors">Cancel</a>
    </div>
  </form>

  <div class="bg-white rounded-xl border border-red-200 p-5">
    <h3 class="text-base font-semibold text-red-800 mb-2">Danger Zone</h3>
    <p class="text-sm text-gray-600 mb-4">Permanently delete this organization and all associated data.</p>
    <form method="POST" action="{{ url_for('org.delete', org_id=org.id) }}" onsubmit="return confirm('Are you sure? This will delete ALL data for this organization. This cannot be undone!')">
      <button type="submit" class="px-4 py-2 bg-red-600 text-white text-sm font-medium rounded-lg hover:bg-red-700 transition-colors">
        <i class="fa-solid fa-trash-can mr-1"></i> Delete Organization
      </button>
    </form>
  </div>
</div>
{% endblock %}
