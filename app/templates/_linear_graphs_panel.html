<script>
if (!window.__lgEngine) {
  window.__lgEngine = {
    _seriesMap: {},
    _chart: null,
    _candleSeries: null,

    setChart(chart) {
      this._chart = chart;
    },

    clearAll() {
      Object.values(this._seriesMap).forEach(arr => {
        arr.forEach(s => { try { this._chart.removeSeries(s); } catch(e) {} });
      });
      this._seriesMap = {};
    },

    render(candleData, graphs) {
      if (!this._chart || !candleData || !candleData.length) return;
      this.clearAll();
      const active = graphs.filter(g => g.is_active !== false);
      active.forEach(graph => {
        const config = (typeof graph.config === 'string' ? JSON.parse(graph.config) : graph.config) || {};
        const seriesList = config.series || [];
        if (!seriesList.length) return;
        const handles = [];
        seriesList.forEach(s => {
          if (s.enabled === false) return;
          const values = candleData.map((c, i) => {
            const t = c.time || (i + 1) * 86400;
            const v = this._compute(c, s.source);
            return { time: t, value: v };
          });
          try {
            const ls = this._chart.addLineSeries({
              color: s.color || '#3b82f6',
              lineWidth: s.line_width || 2,
              lineStyle: s.line_style || 0,
              title: s.label || s.source,
              lastValueVisible: true,
              priceLineVisible: false,
            });
            ls.setData(values);
            handles.push(ls);
          } catch(e) { console.error('LG line error:', e); }
        });
        this._seriesMap[graph.id] = handles;
      });
    },

    _compute(c, source) {
      const o = +c.open, h = +c.high, l = +c.low, cl = +c.close, v = +c.volume;
      const bd = c.body != null ? +c.body : Math.abs(cl - o);
      const uw = c.upper_wick != null ? +c.upper_wick : h - Math.max(o, cl);
      const lw = c.lower_wick != null ? +c.lower_wick : Math.min(o, cl) - l;
      const rng = h - l;
      const map = {
        open: o, high: h, low: l, close: cl, volume: v,
        body: bd, upper_wick: uw, lower_wick: lw,
        range: rng,
        body_ratio: rng > 0 ? (bd / rng) * 100 : 0,
        upper_wick_ratio: rng > 0 ? (uw / rng) * 100 : 0,
        lower_wick_ratio: rng > 0 ? (lw / rng) * 100 : 0,
        hl2: (h + l) / 2,
        hlc3: (h + l + cl) / 3,
        ohlc4: (o + h + l + cl) / 4,
      };
      return map[source] != null ? map[source] : 0;
    }
  };
}
</script>

<script>
function linearGraphsPanel() {
  return {
    graphs: [],
    loading: false,
    showForm: false,
    showGenerateModal: false,
    showAnalyzeModal: false,
    editingId: null,
    formName: '',
    formDesc: '',
    formSeries: [],
    genPrompt: '',
    genLoading: false,
    genError: '',
    analyzeGraph: null,
    analyzeQuestion: '',
    analyzeAnswer: '',
    analyzeLoading: false,
    analyzeError: '',

    init() {
      this.fetchGraphs();
      this.$watch('graphs', () => this.rerenderOverlays());
    },

    fetchGraphs() {
      this.loading = true;
      fetch('/api/linear-graphs')
        .then(r => r.json())
        .then(data => { this.graphs = data || []; this.loading = false; })
        .catch(e => { console.error('LG fetch error:', e); this.loading = false; });
    },

    toggleGraph(id, checked) {
      fetch(`/api/linear-graphs/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({is_active: checked}),
      }).then(r => { if (r.ok) { const g = this.graphs.find(x => x.id === id); if (g) g.is_active = checked; this.rerenderOverlays(); } })
      .catch(e => console.error('LG toggle error:', e));
    },

    deleteGraph(id, name) {
      if (!confirm(`Delete "${name}"?`)) return;
      fetch(`/api/linear-graphs/${id}`, {method: 'DELETE'})
        .then(r => { if (r.ok) { this.graphs = this.graphs.filter(x => x.id !== id); this.rerenderOverlays(); } })
        .catch(e => console.error('LG delete error:', e));
    },

    toggleSeries(graphId, seriesIndex, checked) {
      const g = this.graphs.find(x => x.id === graphId);
      if (!g) return;
      const cfg = (typeof g.config === 'string' ? JSON.parse(g.config) : g.config) || {};
      if (!cfg.series || !cfg.series[seriesIndex]) return;
      cfg.series[seriesIndex].enabled = checked;
      g.config = cfg;
      fetch(`/api/linear-graphs/${graphId}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({config: cfg}),
      }).then(r => { if (r.ok) this.rerenderOverlays(); })
      .catch(e => console.error('LG series toggle error:', e));
    },

    openAddForm() {
      this.editingId = null;
      this.formName = '';
      this.formDesc = '';
      this.formSeries = [];
      this.showForm = true;
    },

    openEditForm(g) {
      this.editingId = g.id;
      this.formName = g.name;
      this.formDesc = g.description || '';
      const cfg = (typeof g.config === 'string' ? JSON.parse(g.config) : g.config) || {};
      this.formSeries = (cfg.series || []).map(s => ({...s}));
      this.showForm = true;
    },

    addSeriesRow() {
      this.formSeries.push({source: 'close', label: '', color: '#3b82f6', line_style: 0, enabled: true});
    },

    saveGraph() {
      if (!this.formName.trim()) return;
      const body = {
        name: this.formName.trim(),
        description: this.formDesc.trim(),
        config: {series: this.formSeries},
      };
      const url = this.editingId ? `/api/linear-graphs/${this.editingId}` : '/api/linear-graphs';
      const method = this.editingId ? 'PUT' : 'POST';
      fetch(url, {method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)})
        .then(r => { if (r.ok) { this.showForm = false; this.fetchGraphs(); } })
        .catch(e => console.error('LG save error:', e));
    },

    aiGenerate() {
      if (!this.genPrompt.trim()) return;
      this.genLoading = true;
      this.genError = '';
      fetch('/api/linear-graphs/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt: this.genPrompt.trim()}),
      })
        .then(r => r.json().then(d => ({ok: r.ok, data: d})))
        .then(({ok, data}) => {
          this.genLoading = false;
          if (!ok) { this.genError = data.error || 'Generation failed'; return; }
          this.showGenerateModal = false;
          this.genPrompt = '';
          this.editingId = null;
          this.formName = data.name || '';
          this.formDesc = data.description || '';
          this.formSeries = (data.series || []).map(s => ({
            source: s.source || 'close',
            label: s.label || s.source || '',
            color: s.color || '#3b82f6',
            line_style: s.line_style || 0,
            enabled: true,
          }));
          this.showForm = true;
        })
        .catch(e => { this.genLoading = false; this.genError = e.message; });
    },

    openAnalyzeModal(g) {
      this.analyzeGraph = g;
      this.analyzeQuestion = '';
      this.analyzeAnswer = '';
      this.analyzeError = '';
      this.showAnalyzeModal = true;
    },

    analyzeGraphWithAi() {
      if (!this.analyzeGraph) return;
      this.analyzeLoading = true;
      this.analyzeError = '';
      this.analyzeAnswer = '';
      const candleData = window.__candleData || [];
      fetch(`/api/linear-graphs/${this.analyzeGraph.id}/analyze`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({candles: candleData, question: this.analyzeQuestion.trim()}),
      })
        .then(r => r.json().then(d => ({ok: r.ok, data: d})))
        .then(({ok, data}) => {
          this.analyzeLoading = false;
          if (!ok) { this.analyzeError = data.error || 'Analysis failed'; return; }
          this.analyzeAnswer = data.answer;
        })
        .catch(e => { this.analyzeLoading = false; this.analyzeError = e.message; });
    },

    rerenderOverlays() {
      const candleData = window.__candleData || [];
      if (!candleData.length) return;
      if (window.__lgEngine) {
        window.__lgEngine.render(candleData, this.graphs);
      }
    },
  };
}
</script>
